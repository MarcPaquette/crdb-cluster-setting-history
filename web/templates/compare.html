<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Clusters - CockroachDB Cluster Settings History</title>
    <script nonce="{{.Nonce}}">
        (function() {
            var saved = localStorage.getItem('theme');
            var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        :root {
            --bg-deep: #06060c;
            --bg-primary: #0c0c14;
            --bg-secondary: #111119;
            --bg-tertiary: #161620;
            --bg-elevated: #1a1a26;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent: #6933FF;
            --accent-hover: #7c4dff;
            --accent-glow: rgba(105, 51, 255, 0.2);
            --accent-subtle: rgba(105, 51, 255, 0.08);
            --accent-secondary: #1BF8EC;
            --border: #1e293b;
            --border-accent: rgba(105, 51, 255, 0.25);
            --hover-bg: rgba(105, 51, 255, 0.04);
            --old-value-bg: rgba(248, 113, 113, 0.1);
            --old-value-text: #f87171;
            --new-value-bg: rgba(74, 222, 128, 0.1);
            --new-value-text: #4ade80;
            --em-text: #475569;
            --warning-bg: rgba(251, 191, 36, 0.1);
            --warning-text: #fbbf24;
            --btn-text: #ffffff;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Menlo', 'Monaco', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        :root[data-theme="light"] {
            --bg-deep: #f1f5f9;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f8fafc;
            --bg-elevated: #ffffff;
            --text-primary: #242A35;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #6933FF;
            --accent-hover: #5a24e6;
            --accent-glow: rgba(105, 51, 255, 0.12);
            --accent-subtle: rgba(105, 51, 255, 0.05);
            --accent-secondary: #0fa89e;
            --border: #D6DBE7;
            --border-accent: rgba(105, 51, 255, 0.25);
            --hover-bg: rgba(105, 51, 255, 0.04);
            --old-value-bg: rgba(220, 38, 38, 0.08);
            --old-value-text: #dc2626;
            --new-value-bg: rgba(22, 163, 74, 0.08);
            --new-value-text: #16a34a;
            --em-text: #94a3b8;
            --warning-bg: rgba(217, 119, 6, 0.08);
            --warning-text: #d97706;
            --btn-text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                linear-gradient(var(--accent-subtle) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-subtle) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* === Navigation === */
        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 52px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .nav-brand {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.3px;
            margin-right: 32px;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            gap: 4px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background: var(--hover-bg);
        }

        .nav-links a.active {
            color: var(--accent);
            background: var(--accent-subtle);
        }

        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: none;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            transition: border-color 0.15s, background 0.15s;
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            border-color: var(--text-muted);
            background: var(--hover-bg);
        }

        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: inline; }
        :root[data-theme="light"] .theme-toggle .icon-sun { display: inline; }
        :root[data-theme="light"] .theme-toggle .icon-moon { display: none; }

        .logout-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            padding: 5px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: none;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: color 0.15s, border-color 0.15s;
        }

        .logout-btn:hover {
            color: var(--text-secondary);
            border-color: var(--text-muted);
        }

        /* === Main Content === */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            margin-bottom: 20px;
        }

        /* === Controls === */
        .controls {
            display: flex;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .cluster-select {
            padding: 7px 12px;
            font-size: 12px;
            font-family: var(--font-mono);
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            min-width: 180px;
        }

        .cluster-select:focus {
            border-color: var(--accent);
        }

        .vs-text {
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--accent-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 4px;
            padding-bottom: 8px;
        }

        .btn {
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
            font-family: var(--font-sans);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--btn-text);
            border: none;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* === Table === */
        .table-wrapper {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 10px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            font-family: var(--font-mono);
        }

        td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: var(--hover-bg); }

        .value {
            font-family: var(--font-mono);
            font-size: 12px;
            word-break: break-all;
        }

        .cluster1-value {
            color: var(--old-value-text);
            background: var(--old-value-bg);
            padding: 2px 6px;
            border-radius: 3px;
        }

        .cluster2-value {
            color: var(--new-value-text);
            background: var(--new-value-bg);
            padding: 2px 6px;
            border-radius: 3px;
        }

        .variable {
            font-weight: 500;
            font-family: var(--font-mono);
            font-size: 12px;
            cursor: help;
        }

        .variable[title]:hover {
            color: var(--accent);
            text-decoration: underline dotted;
        }

        em { color: var(--em-text); font-style: normal; font-size: 11px; }

        /* === Section Headers === */
        .section-header {
            margin-top: 24px;
            margin-bottom: 8px;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px 8px 0 0;
            border-bottom: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header + .table-wrapper {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }

        .section-header h2 {
            margin: 0;
            font-size: 13px;
            font-weight: 600;
        }

        .section-header .count {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 12px;
        }

        .section-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .section-dot.different { background: var(--accent); }
        .section-dot.only1 { background: var(--old-value-text); }
        .section-dot.only2 { background: var(--new-value-text); }

        /* === States === */
        .no-results {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
        }

        .loading {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">Cockroach Database Settings Auditor</a>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/history">History</a></li>
            <li><a href="/compare" class="active">Compare</a></li>
            <li><a href="/fleet">Fleet</a></li>
        </ul>
        <div class="nav-right">
            <button id="themeToggle" class="theme-toggle" title="Toggle theme">
                <span class="icon-sun">&#9788;</span>
                <span class="icon-moon">&#9790;</span>
            </button>
            <form method="POST" action="/logout" style="margin:0;padding:0;display:inline;">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Compare Cluster Settings</h1>

        <div class="controls">
            <select id="cluster1" class="cluster-select">
                <option value="">Select Cluster 1</option>
                {{range .Clusters}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
            <span class="vs-text">vs</span>
            <select id="cluster2" class="cluster-select">
                <option value="">Select Cluster 2</option>
                {{range .Clusters}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
            <button id="compareBtn" class="btn btn-primary" disabled>Compare</button>
        </div>

        <div id="loading" class="loading hidden">Loading comparison...</div>
        <div id="results"></div>
    </div>

    <script nonce="{{.Nonce}}">
        const cluster1Select = document.getElementById('cluster1');
        const cluster2Select = document.getElementById('cluster2');
        const compareBtn = document.getElementById('compareBtn');
        const resultsDiv = document.getElementById('results');
        const loadingDiv = document.getElementById('loading');

        function updateButtonState() {
            const c1 = cluster1Select.value;
            const c2 = cluster2Select.value;
            compareBtn.disabled = !c1 || !c2 || c1 === c2;
        }

        cluster1Select.addEventListener('change', updateButtonState);
        cluster2Select.addEventListener('change', updateButtonState);

        compareBtn.addEventListener('click', async function() {
            const c1 = cluster1Select.value;
            const c2 = cluster2Select.value;

            if (!c1 || !c2 || c1 === c2) return;

            resultsDiv.innerHTML = '';
            loadingDiv.classList.remove('hidden');
            compareBtn.disabled = true;

            try {
                const response = await fetch('/api/compare?cluster1=' + encodeURIComponent(c1) + '&cluster2=' + encodeURIComponent(c2));
                if (!response.ok) {
                    throw new Error('Failed to compare clusters');
                }
                const data = await response.json();
                renderResults(data, c1, c2);
            } catch (e) {
                resultsDiv.innerHTML = '<div class="no-results">Error: ' + e.message + '</div>';
            } finally {
                loadingDiv.classList.add('hidden');
                updateButtonState();
            }
        });

        function getClusterName(id) {
            const select = document.getElementById('cluster1');
            for (const opt of select.options) {
                if (opt.value === id) return opt.textContent;
            }
            return id;
        }

        function renderResults(data, c1, c2) {
            const c1Name = getClusterName(c1);
            const c2Name = getClusterName(c2);
            let html = '';

            // Different values section
            if (data.different && data.different.length > 0) {
                html += '<div class="section-header"><span class="section-dot different"></span><h2>Different Values <span class="count">(' + data.different.length + ')</span></h2></div>';
                html += '<div class="table-wrapper"><table><thead><tr><th>Setting</th><th>' + escapeHtml(c1Name) + '</th><th>' + escapeHtml(c2Name) + '</th></tr></thead><tbody>';
                for (const diff of data.different) {
                    html += '<tr>';
                    html += '<td class="variable" title="' + escapeHtml(diff.description || '') + '">' + escapeHtml(diff.variable) + '</td>';
                    html += '<td class="value"><span class="cluster1-value">' + escapeHtml(diff.value1) + '</span></td>';
                    html += '<td class="value"><span class="cluster2-value">' + escapeHtml(diff.value2) + '</span></td>';
                    html += '</tr>';
                }
                html += '</tbody></table></div>';
            }

            // Only in cluster1 section
            if (data.cluster1_only && data.cluster1_only.length > 0) {
                html += '<div class="section-header"><span class="section-dot only1"></span><h2>Only in ' + escapeHtml(c1Name) + ' <span class="count">(' + data.cluster1_only.length + ')</span></h2></div>';
                html += '<div class="table-wrapper"><table><thead><tr><th>Setting</th><th>Value</th></tr></thead><tbody>';
                for (const diff of data.cluster1_only) {
                    html += '<tr>';
                    html += '<td class="variable" title="' + escapeHtml(diff.description || '') + '">' + escapeHtml(diff.variable) + '</td>';
                    html += '<td class="value"><span class="cluster1-value">' + escapeHtml(diff.value1) + '</span></td>';
                    html += '</tr>';
                }
                html += '</tbody></table></div>';
            }

            // Only in cluster2 section
            if (data.cluster2_only && data.cluster2_only.length > 0) {
                html += '<div class="section-header"><span class="section-dot only2"></span><h2>Only in ' + escapeHtml(c2Name) + ' <span class="count">(' + data.cluster2_only.length + ')</span></h2></div>';
                html += '<div class="table-wrapper"><table><thead><tr><th>Setting</th><th>Value</th></tr></thead><tbody>';
                for (const diff of data.cluster2_only) {
                    html += '<tr>';
                    html += '<td class="variable" title="' + escapeHtml(diff.description || '') + '">' + escapeHtml(diff.variable) + '</td>';
                    html += '<td class="value"><span class="cluster2-value">' + escapeHtml(diff.value2) + '</span></td>';
                    html += '</tr>';
                }
                html += '</tbody></table></div>';
            }

            if (!html) {
                html = '<div class="no-results">No differences found between the clusters.</div>';
            }

            resultsDiv.innerHTML = html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });
    </script>
</body>
</html>
