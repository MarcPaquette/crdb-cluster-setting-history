name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  migration-test:
    name: Migration smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start CockroachDB
        run: |
          docker run -d --name cockroachdb-release-test \
            -p 26257:26257 -p 8080:8080 \
            cockroachdb/cockroach:latest \
            start-single-node --insecure --advertise-addr=localhost

      - name: Wait for CockroachDB
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "CockroachDB is ready"
              break
            fi
            echo "Waiting... (attempt $i/30)"
            sleep 2
            if [ $i -eq 30 ]; then
              echo "CockroachDB failed to start"
              docker logs cockroachdb-release-test
              exit 1
            fi
          done

      - name: Build and test fresh migration
        env:
          DATABASE_URL: postgresql://root@localhost:26257/defaultdb?sslmode=disable
        run: |
          go build -o crdb-cluster-history .

          # Init + migration must complete within 30 seconds (catches DDL hangs)
          timeout 30 ./crdb-cluster-history init

          # Verify all expected tables exist
          for table in schema_migrations snapshots settings changes metadata annotations; do
            result=$(docker exec cockroachdb-release-test cockroach sql --insecure \
              --database=cluster_history -e \
              "SELECT count(*) FROM information_schema.tables WHERE table_name = '$table'" \
              --format=csv 2>/dev/null | tail -1)
            if [ "$result" != "1" ]; then
              echo "FAIL: table $table not found after migration"
              exit 1
            fi
          done
          echo "Fresh migration completed successfully — all tables verified"

      - name: CockroachDB logs on failure
        if: failure()
        run: docker logs cockroachdb-release-test

  build:
    needs: migration-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-X main.Version=${{ steps.version.outputs.VERSION }}" \
            -o crdb-cluster-history-${{ matrix.suffix }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crdb-cluster-history-${{ matrix.suffix }}
          path: crdb-cluster-history-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            binary=$(basename "$dir")
            cp "$dir$binary" "release/$binary"
            chmod +x "release/$binary"
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
