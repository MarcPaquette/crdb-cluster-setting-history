name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (CockroachDB latest)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://root@localhost:26257/defaultdb?sslmode=disable
      HISTORY_DATABASE_URL: postgresql://history_test_user@localhost:26258/cluster_history?sslmode=disable
      HISTORY_ADMIN_URL: postgresql://root@localhost:26258/defaultdb?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start CockroachDB (source cluster)
        run: |
          docker run -d --name cockroachdb-source \
            -p 26257:26257 -p 8080:8080 \
            cockroachdb/cockroach:latest \
            start-single-node --insecure --advertise-addr=localhost

      - name: Start CockroachDB (history cluster)
        run: |
          docker run -d --name cockroachdb-history \
            -p 26258:26257 -p 8081:8080 \
            cockroachdb/cockroach:latest \
            start-single-node --insecure --advertise-addr=localhost

      - name: Wait for CockroachDB clusters
        run: |
          for port in 8080 8081; do
            for i in $(seq 1 30); do
              if curl -sf http://localhost:$port/health > /dev/null 2>&1; then
                echo "CockroachDB on port $port is ready"
                break
              fi
              echo "Waiting for port $port... (attempt $i/30)"
              sleep 2
              if [ $i -eq 30 ]; then
                echo "CockroachDB on port $port failed to start"
                docker logs cockroachdb-source
                docker logs cockroachdb-history
                exit 1
              fi
            done
          done

      - name: Initialize test database on history cluster
        run: |
          docker exec cockroachdb-history cockroach sql --insecure -e "
            CREATE DATABASE IF NOT EXISTS cluster_history;
            CREATE USER IF NOT EXISTS history_test_user;
            GRANT ALL ON DATABASE cluster_history TO history_test_user;
          "
          docker exec cockroachdb-history cockroach sql --insecure \
            --database=cluster_history -e "
            ALTER DEFAULT PRIVILEGES GRANT ALL ON TABLES TO history_test_user;
          "

      - name: Fresh migration smoke test
        run: |
          # Build the binary and test that init + migration completes on a clean database.
          # This catches DDL hang regressions — the timeout will kill a stuck migration.
          go build -o crdb-cluster-history .

          timeout 30 ./crdb-cluster-history init

          # Verify all expected tables exist in the history database
          for table in schema_migrations snapshots settings changes metadata annotations; do
            result=$(docker exec cockroachdb-history cockroach sql --insecure \
              --database=cluster_history -e \
              "SELECT count(*) FROM information_schema.tables WHERE table_name = '$table'" \
              --format=csv 2>/dev/null | tail -1)
            if [ "$result" != "1" ]; then
              echo "FAIL: table $table not found after migration"
              exit 1
            fi
          done
          echo "All tables created successfully"

          # Clean up — drop the database so Go tests start fresh
          docker exec cockroachdb-history cockroach sql --insecure -e \
            "DROP DATABASE IF EXISTS cluster_history CASCADE"
          docker exec cockroachdb-history cockroach sql --insecure -e \
            "DROP USER IF EXISTS history_user"
        env:
          DATABASE_URL: postgresql://root@localhost:26258/defaultdb?sslmode=disable

      - name: Run tests
        run: go test -p 1 -race -v -count=1 ./...

      - name: Run tests with coverage
        run: |
          go test -p 1 -race -coverprofile=coverage.out -count=1 ./...
          go tool cover -func=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: CockroachDB logs on failure
        if: failure()
        run: |
          echo "=== Source cluster logs ==="
          docker logs cockroachdb-source
          echo "=== History cluster logs ==="
          docker logs cockroachdb-history
